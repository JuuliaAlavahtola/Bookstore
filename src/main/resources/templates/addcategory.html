<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Category</title>
</head>
<body>

<h2>Add Category</h2>

<form th:action="@{/savecategory}" th:object="${category}" method="post">
    <p>Name: <input type="text" th:field="*{name}" /></p>
    <p><input type="submit" value="Save"></p>
</form>

</body>
</html>
